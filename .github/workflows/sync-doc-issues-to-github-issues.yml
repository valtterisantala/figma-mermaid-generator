name: Sync doc issues to GitHub issues

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/issues/**/*.md'
      - 'docs/issues/*.md'

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync markdown files to GitHub issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const issuesDir = path.join(process.env.GITHUB_WORKSPACE, 'docs', 'issues');

            if (!fs.existsSync(issuesDir)) {
              core.info('docs/issues does not exist, nothing to sync.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function walk(dir) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              const files = [];
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...walk(fullPath));
                } else if (entry.isFile() && entry.name.endsWith('.md')) {
                  files.push(fullPath);
                }
              }
              return files;
            }

            function extractTitle(content, fallbackName) {
              const lines = content.split(/\r?\n/);
              for (const line of lines) {
                const match = line.match(/^#\s+(.+)$/);
                if (match) return match[1].trim();
              }
              return fallbackName.replace(/\.md$/, '').replace(/[-_]/g, ' ');
            }

            const files = walk(issuesDir);
            core.info(`Found ${files.length} markdown files.`);

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            for (const fullPath of files) {
              const relativePath = path
                .relative(process.env.GITHUB_WORKSPACE, fullPath)
                .replace(/\\/g, '/');

              const content = fs.readFileSync(fullPath, 'utf8').trim();
              const title = extractTitle(content, path.basename(fullPath));
              const marker = `<!-- source: ${relativePath} -->`;
              const body = `${content}\n\n---\n${marker}`;

              const existingIssue = existingIssues.find(issue =>
                !issue.pull_request &&
                typeof issue.body === 'string' &&
                issue.body.includes(marker)
              );

              if (existingIssue) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existingIssue.number,
                  title,
                  body,
                  state: 'open'
                });
                core.info(`Updated issue #${existingIssue.number} from ${relativePath}.`);
                continue;
              }

              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['planning-task']
              });

              core.info(`Created issue #${created.data.number} from ${relativePath}.`);
            }
